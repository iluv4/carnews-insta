name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # Dummy URL — prisma generate only needs schema, not a real connection
          DATABASE_POSTGRES_PRISMA_URL: postgresql://ci:ci@localhost:5432/ci
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Type check
        run: npx tsc --noEmit
